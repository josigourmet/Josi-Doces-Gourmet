<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin - Josi Doces Gourmet</title>

<style>

body{
    margin:0;
    padding:20px;
    background:#fdf5e6;
    font-family:Arial;
}

h1{
    text-align:center;
    color:#5d4037;
    margin-bottom:30px;
}

.card{
    background:white;
    border-radius:20px;
    padding:20px;
    margin-bottom:20px;
    box-shadow:0 4px 15px rgba(0,0,0,0.1);
}

.nome{
    font-size:22px;
    font-weight:bold;
    color:#5d4037;
}

.info{
    margin-top:8px;
    color:#444;
    line-height:1.6;
}

.itens{
    background:#fafafa;
    padding:15px;
    border-radius:10px;
    margin-top:15px;
}

.item{
    margin-bottom:8px;
}

.total{
    font-size:22px;
    color:#5d4037;
    font-weight:bold;
    margin-top:15px;
}

.status{
    margin-top:15px;
    padding:10px;
    border-radius:10px;
    color:white;
    font-weight:bold;
    text-align:center;
}

.novo{
    background:#f39c12;
}

.preparando{
    background:#e67e22;
}

.saiu{
    background:#3498db;
}

.entregue{
    background:#27ae60;
}

select{
    width:100%;
    padding:12px;
    border-radius:10px;
    margin-top:15px;
    border:1px solid #ddd;
    font-size:16px;
}

button{
    width:100%;
    border:none;
    padding:14px;
    border-radius:10px;
    margin-top:10px;
    cursor:pointer;
    font-size:16px;
    font-weight:bold;
}

.btn-zap{
    background:#25D366;
    color:white;
}

.topo{
    background:#5d4037;
    color:white;
    padding:15px;
    border-radius:15px;
    margin-bottom:20px;
    text-align:center;
    font-size:18px;
    font-weight:bold;
}

.vazio{
    text-align:center;
    color:#777;
    margin-top:50px;
    font-size:18px;
}

</style>

</head>

<body>

<script>

const senha = prompt("Digite a senha do admin:");

if(senha !== "123456"){

    alert("Acesso negado");

    location.href = "/";

}

</script>

<div class="topo">
🍬 Painel Administrativo - Josi Doces Gourmet
</div>

<h1>Pedidos em Tempo Real</h1>

<div id="pedidos"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
    getDatabase,
    ref,
    onValue,
    update
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyCHzkyYek4fV7fs_1f6FTA9o4o3ikJuhs0",
  authDomain: "josigourmet-af3ff.firebaseapp.com",
  databaseURL: "https://josigourmet-af3ff-default-rtdb.firebaseio.com",
  projectId: "josigourmet-af3ff",
  storageBucket: "josigourmet-af3ff.firebasestorage.app",
  messagingSenderId: "373768013260",
  appId: "1:373768013260:web:bd5fa8dcf6053414d7c969",
  measurementId: "G-XR4249E0QG"
};

const app = initializeApp(firebaseConfig);

const db = getDatabase(app);

const pedidosRef = ref(db, "pedidos");

onValue(pedidosRef, (snapshot)=>{

    const dados = snapshot.val();

    const container = document.getElementById("pedidos");

    container.innerHTML = "";

    if(!dados){

        container.innerHTML = `
            <div class="vazio">
                Nenhum pedido encontrado 🍰
            </div>
        `;

        return;
    }

    Object.entries(dados).reverse().forEach(([id, pedido])=>{

        let classe = "novo";

        if(pedido.status === "preparando"){
            classe = "preparando";
        }

        if(pedido.status === "saiu"){
            classe = "saiu";
        }

        if(pedido.status === "entregue"){
            classe = "entregue";
        }

        const card = document.createElement("div");

        card.className = "card";

        card.innerHTML = `

            <div class="nome">
                ${pedido.cliente}
            </div>

            <div class="info">
                📞 ${pedido.telefone}
            </div>

            <div class="info">
                📍 ${pedido.endereco || "Retirada no local"}
            </div>

            <div class="info">
                🚚 ${pedido.bairro}
            </div>

            <div class="info">
                💳 ${pedido.pagamento}
            </div>

            <div class="info">
                📅 ${pedido.data}
            </div>

            <div class="info">
                🕒 ${pedido.hora}
            </div>

            <div class="itens">

                <strong>🛒 Itens do Pedido</strong>

                <hr>

                ${pedido.itens.map(item => `
                    <div class="item">
                        ${item.qtd}x ${item.nome}
                    </div>
                `).join("")}

            </div>

            <div class="total">
                Total: R$ ${pedido.total.toFixed(2)}
            </div>

            <div class="status ${classe}">
                ${textoStatus(pedido.status)}
            </div>

            <select onchange="alterarStatus(
                '${id}',
                this.value
            )">

                <option value="novo"
                    ${pedido.status=="novo"?"selected":""}>
                    🟡 Pedido Recebido
                </option>

                <option value="preparando"
                    ${pedido.status=="preparando"?"selected":""}>
                    🟠 Pedido em Preparação
                </option>

                <option value="saiu"
                    ${pedido.status=="saiu"?"selected":""}>
                    🔵 Saiu para Entrega
                </option>

                <option value="entregue"
                    ${pedido.status=="entregue"?"selected":""}>
                    🟢 Pedido Entregue
                </option>

            </select>

            <button
                class="btn-zap"
                onclick="enviarWhatsapp(
                    '${pedido.telefone}',
                    '${pedido.cliente}',
                    '${pedido.status}'
                )"
            >
                💬 Enviar WhatsApp
            </button>

        `;

        container.appendChild(card);

    });

});

window.textoStatus = function(status){

    if(status === "novo"){
        return "🟡 Pedido Recebido";
    }

    if(status === "preparando"){
        return "🟠 Pedido em Preparação";
    }

    if(status === "saiu"){
        return "🔵 Saiu para Entrega";
    }

    if(status === "entregue"){
        return "🟢 Pedido Entregue";
    }

    return status;

}

window.alterarStatus = async function(id, status){

    const pedidoRef = ref(db, `pedidos/${id}`);

    await update(pedidoRef, {
        status: status
    });

}

window.enviarWhatsapp = function(
    telefone,
    cliente,
    status
){

    let mensagem = "";

    if(status === "novo"){

        mensagem =
`🍬 Olá ${cliente}!

Seu pedido foi recebido com sucesso 🤎

Já vamos iniciar o preparo.`;

    }

    if(status === "preparando"){

        mensagem =
`👩‍🍳 Olá ${cliente}!

Seu pedido está em preparação 🤎🍰`;

    }

    if(status === "saiu"){

        mensagem =
`🚚 Olá ${cliente}!

Seu pedido saiu para entrega 🤎`;

    }

    if(status === "entregue"){

        mensagem =
`✅ Olá ${cliente}!

Seu pedido foi entregue.

Muito obrigado pela preferência 🤎🍬`;

    }

    const numero = telefone.replace(/\D/g,'');

    window.open(
        `https://wa.me/55${numero}?text=${encodeURIComponent(mensagem)}`
    );

}

</script>

</body>
</html>
