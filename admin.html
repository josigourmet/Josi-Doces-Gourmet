<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin - Josi Doces Gourmet</title>

<style>

body{
    margin:0;
    padding:20px;
    background:#fdf5e6;
    font-family:Arial;
}

.topo{
    background:#5d4037;
    color:white;
    padding:18px;
    border-radius:15px;
    text-align:center;
    font-size:22px;
    font-weight:bold;
    margin-bottom:20px;
}

h1{
    text-align:center;
    color:#5d4037;
}

.card{
    background:white;
    border-radius:20px;
    padding:20px;
    margin-bottom:25px;
    box-shadow:0 4px 15px rgba(0,0,0,0.1);
}

.novo-pedido{
    border:4px solid #ff0000;
    animation:pulse 1s infinite;
}

@keyframes pulse{

    0%{
        transform:scale(1);
    }

    50%{
        transform:scale(1.01);
    }

    100%{
        transform:scale(1);
    }

}

.alerta{
    background:#ff0000;
    color:white;
    padding:10px;
    border-radius:10px;
    text-align:center;
    font-weight:bold;
    margin-bottom:15px;
}

.nome{
    font-size:24px;
    font-weight:bold;
    color:#5d4037;
}

.info{
    margin-top:8px;
    line-height:1.6;
    color:#444;
}

.itens{
    margin-top:15px;
    background:#fafafa;
    padding:15px;
    border-radius:10px;
}

.item{
    margin-bottom:8px;
}

.total{
    font-size:24px;
    font-weight:bold;
    color:#5d4037;
    margin-top:15px;
}

.status{
    margin-top:15px;
    padding:12px;
    border-radius:10px;
    text-align:center;
    color:white;
    font-weight:bold;
}

.novo{
    background:#f39c12;
}

.preparando{
    background:#e67e22;
}

.saiu{
    background:#3498db;
}

.pronto{
    background:#9b59b6;
}

.entregue{
    background:#27ae60;
}

.rejeitado{
    background:#e74c3c;
}

select{
    width:100%;
    padding:14px;
    border-radius:10px;
    margin-top:15px;
    border:1px solid #ddd;
    font-size:16px;
}

button{
    width:100%;
    border:none;
    padding:14px;
    border-radius:10px;
    margin-top:10px;
    cursor:pointer;
    font-size:16px;
    font-weight:bold;
}

.btn-zap{
    background:#25D366;
    color:white;
}

.btn-excluir{
    background:#e74c3c;
    color:white;
}

.vazio{
    text-align:center;
    color:#777;
    margin-top:50px;
    font-size:20px;
}

</style>

</head>

<body>

<script>

const senha = prompt("Digite a senha do admin:");

if(senha !== "123456"){

    alert("Acesso negado");

    location.href = "/";

}

</script>

<div class="topo">
🍬 Painel Administrativo - Josi Doces Gourmet
</div>

<h1>Pedidos em Tempo Real</h1>

<div id="pedidos"></div>

<audio id="somNovoPedido">

<source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8c8a73467.mp3?filename=notification-2-269292.mp3">

</audio>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
    getDatabase,
    ref,
    onValue,
    update,
    remove
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {

  apiKey: "AIzaSyCHzkyYek4fV7fs_1f6FTA9o4o3ikJuhs0",

  authDomain: "josigourmet-af3ff.firebaseapp.com",

  databaseURL: "https://josigourmet-af3ff-default-rtdb.firebaseio.com",

  projectId: "josigourmet-af3ff",

  storageBucket: "josigourmet-af3ff.firebasestorage.app",

  messagingSenderId: "373768013260",

  appId: "1:373768013260:web:bd5fa8dcf6053414d7c969",

  measurementId: "G-XR4249E0QG"

};

const app = initializeApp(firebaseConfig);

const db = getDatabase(app);

const pedidosRef = ref(db, "pedidos");

let primeiraCarga = true;

onValue(pedidosRef, (snapshot)=>{

    const dados = snapshot.val();

    const container = document.getElementById("pedidos");

    container.innerHTML = "";

    if(!dados){

        container.innerHTML = `
            <div class="vazio">
                Nenhum pedido encontrado 🍰
            </div>
        `;

        return;

    }

    const pedidosArray = Object.entries(dados);

    if(!primeiraCarga){

        const possuiNovo = pedidosArray.some(
            ([id,pedido]) => pedido.status === "novo"
        );

        if(possuiNovo){

            document
                .getElementById("somNovoPedido")
                .play();

        }

    }

    primeiraCarga = false;

    pedidosArray.reverse().forEach(([id, pedido])=>{

        let classe = "novo";

        if(pedido.status === "preparando"){
            classe = "preparando";
        }

        if(pedido.status === "saiu"){
            classe = "saiu";
        }

        if(pedido.status === "pronto"){
            classe = "pronto";
        }

        if(pedido.status === "entregue"){
            classe = "entregue";
        }

        if(pedido.status === "rejeitado"){
            classe = "rejeitado";
        }

        const card = document.createElement("div");

        card.className =
            pedido.status === "novo"
            ? "card novo-pedido"
            : "card";

        card.innerHTML = `

            ${pedido.status === "novo" ? `
                <div class="alerta">
                    🚨 NOVO PEDIDO AGUARDANDO RESPOSTA
                </div>
            ` : ""}

            <div class="nome">
                🧾 Pedido #${pedido.numeroPedido || "000"}
            </div>

            <div style="
                margin-top:8px;
                font-size:22px;
                font-weight:bold;
                color:#5d4037;
            ">
                ${pedido.cliente}
            </div>

            <div class="info">
                📞 ${pedido.telefone}
            </div>

            <div class="info">
                📍 ${pedido.endereco || "Retirada no local"}
            </div>

            <div class="info">
                🚚 ${pedido.bairro}
            </div>

            <div class="info">
                💳 ${pedido.pagamento}
            </div>

            <div class="info">
                📅 ${pedido.data}
            </div>

            <div class="info">
                🕒 ${pedido.hora}
            </div>

            <div class="itens">

                <strong>🛒 Itens do Pedido</strong>

                <hr>

                ${pedido.itens.map(item => `
                    <div class="item">
                        ${item.qtd}x ${item.nome}
                    </div>
                `).join("")}

            </div>

            <div class="total">
                Total: R$ ${pedido.total.toFixed(2)}
            </div>

            <div class="status ${classe}">
                ${textoStatus(pedido.status)}
            </div>

            <select onchange="alterarStatus(
                '${id}',
                this.value
            )">

                <option value="novo"
                    ${pedido.status=="novo"?"selected":""}>
                    🟡 Pedido Recebido
                </option>

                <option value="preparando"
                    ${pedido.status=="preparando"?"selected":""}>
                    🟠 Pedido em Preparação
                </option>

                <option value="saiu"
                    ${pedido.status=="saiu"?"selected":""}>
                    🔵 Saiu para Entrega
                </option>

                <option value="pronto"
                    ${pedido.status=="pronto"?"selected":""}>
                    🟣 Pedido Pronto para Retirada
                </option>

                <option value="entregue"
                    ${pedido.status=="entregue"?"selected":""}>
                    🟢 Pedido Entregue
                </option>

                <option value="rejeitado"
                    ${pedido.status=="rejeitado"?"selected":""}>
                    ❌ Pedido Rejeitado
                </option>

            </select>

            <button
                class="btn-zap"
                onclick="enviarWhatsapp(
                    '${pedido.telefone}',
                    '${pedido.cliente}',
                    '${pedido.status}',
                    '${pedido.numeroPedido || "000"}'
                )"
            >
                💬 Enviar WhatsApp
            </button>

            <button
                class="btn-excluir"
                onclick="excluirPedido('${id}')"
            >
                🗑️ Excluir Pedido
            </button>

        `;

        container.appendChild(card);

    });

});

window.textoStatus = function(status){

    if(status === "novo"){
        return "🟡 Pedido Recebido";
    }

    if(status === "preparando"){
        return "🟠 Pedido em Preparação";
    }

    if(status === "saiu"){
        return "🔵 Saiu para Entrega";
    }

    if(status === "pronto"){
        return "🟣 Pedido Pronto para Retirada";
    }

    if(status === "entregue"){
        return "🟢 Pedido Entregue";
    }

    if(status === "rejeitado"){
        return "❌ Pedido Rejeitado";
    }

    return status;

}

window.alterarStatus = async function(id, status){

    const pedidoRef = ref(db, `pedidos/${id}`);

    await update(pedidoRef, {
        status: status
    });

}

window.excluirPedido = async function(id){

    const confirmar = confirm(
        "Deseja realmente excluir este pedido?"
    );

    if(!confirmar){
        return;
    }

    const pedidoRef = ref(db, `pedidos/${id}`);

    await remove(pedidoRef);

}

window.enviarWhatsapp = function(
    telefone,
    cliente,
    status,
    numeroPedido
){

    let mensagem = "";

    if(status === "novo"){

        mensagem =
`🍬 Olá ${cliente}!

🧾 Pedido Nº: ${numeroPedido}

Seu pedido foi recebido com sucesso 🤎

Já vamos iniciar o preparo.`;

    }

    if(status === "preparando"){

        mensagem =
`👩‍🍳 Olá ${cliente}!

🧾 Pedido Nº: ${numeroPedido}

Seu pedido está em preparação 🤎🍰`;

    }

    if(status === "saiu"){

        mensagem =
`🚚 Olá ${cliente}!

🧾 Pedido Nº: ${numeroPedido}

Seu pedido saiu para entrega 🤎`;

    }

    if(status === "pronto"){

        mensagem =
`🟣 Olá ${cliente}!

🧾 Pedido Nº: ${numeroPedido}

Seu pedido está pronto para retirada 🤎🍰

Já pode vir buscar.`;

    }

    if(status === "entregue"){

        mensagem =
`✅ Olá ${cliente}!

🧾 Pedido Nº: ${numeroPedido}

Seu pedido foi entregue.

Muito obrigado pela preferência 🤎🍬`;

    }

    if(status === "rejeitado"){

        mensagem =
`❌ Olá ${cliente}!

🧾 Pedido Nº: ${numeroPedido}

Infelizmente não conseguiremos aceitar seu pedido neste momento.

Pedimos desculpas 🤎`;

    }

    const numero = telefone.replace(/\D/g,'');

    window.open(
        `https://wa.me/55${numero}?text=${encodeURIComponent(mensagem)}`
    );

}

</script>

</body>
</html>
