<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Painel Admin</title>

<style>
body{
font-family:Arial;
background:#f5f5f5;
padding:20px;
}

h1{
text-align:center;
}

.pedido{
background:#fff;
padding:15px;
margin-bottom:15px;
border-radius:10px;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

button{
padding:10px;
border:none;
border-radius:8px;
margin:5px;
color:white;
font-weight:bold;
cursor:pointer;
}

.preparo{
background:orange;
}

.entrega{
background:#3498db;
}

.finalizado{
background:green;
}

.status{
font-weight:bold;
margin-top:10px;
}
</style>
</head>

<body>

<h1>🍰 Painel Admin</h1>

<div id="pedidos"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getDatabase,
ref,
onValue,
update
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {

apiKey: "SUA_API_KEY",
authDomain: "SEU_AUTH_DOMAIN",
databaseURL: "SEU_DATABASE_URL",
projectId: "SEU_PROJECT_ID",
storageBucket: "SEU_STORAGE_BUCKET",
messagingSenderId: "SEU_SENDER_ID",
appId: "SEU_APP_ID"

};

const app = initializeApp(firebaseConfig);

const db = getDatabase(app);

const pedidosRef = ref(db, "pedidos");

const pedidosDiv = document.getElementById("pedidos");

onValue(pedidosRef, (snapshot) => {

pedidosDiv.innerHTML = "";

snapshot.forEach((childSnapshot) => {

const pedido = childSnapshot.val();

const pedidoId = childSnapshot.key;

const div = document.createElement("div");

div.className = "pedido";

div.innerHTML = `

<h3>${pedido.cliente}</h3>

<p><b>Telefone:</b> ${pedido.telefone}</p>

<p><b>Endereço:</b> ${pedido.endereco}</p>

<p><b>Total:</b> R$ ${pedido.total}</p>

<p class="status">Status: ${pedido.status}</p>

<button class="preparo"
onclick="atualizarStatus('${pedidoId}','Em preparação','${pedido.telefone}')">
👩‍🍳 Em preparação
</button>

<button class="entrega"
onclick="atualizarStatus('${pedidoId}','Saiu para entrega','${pedido.telefone}')">
🚚 Saiu para entrega
</button>

<button class="finalizado"
onclick="atualizarStatus('${pedidoId}','Entregue','${pedido.telefone}')">
✅ Entregue
</button>

`;

pedidosDiv.appendChild(div);

});

});

window.atualizarStatus = function(id,status,telefone){

update(ref(db,"pedidos/" + id),{
status: status
});

let msg = "";

if(status === "Em preparação"){

msg = "🍰 Josi Doces Gourmet\n\nSeu pedido está em preparação 👩‍🍳";

}

if(status === "Saiu para entrega"){

msg = "🚚 Seu pedido saiu para entrega!";

}

if(status === "Entregue"){

msg = "✅ Pedido entregue!\n\nObrigado pela preferência ❤️";

}

window.open(`https://wa.me/55${telefone}?text=${encodeURIComponent(msg)}`);

}

</script>

</body>
</html>
