<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Meus Pedidos</title>

<style>

body{
    margin:0;
    background:#f5f5f5;
    font-family:Arial;
    padding:20px;
}

.box{
    background:white;
    padding:25px;
    border-radius:20px;
    max-width:500px;
    margin:auto;
    box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

h1{
    text-align:center;
    color:#5d4037;
}

.status{
    margin-top:20px;
    padding:20px;
    border-radius:15px;
    text-align:center;
    font-size:22px;
    font-weight:bold;
    background:#fafafa;
}

.info{
    margin-top:15px;
    line-height:30px;
}

</style>
</head>

<body>

<div class="box">

<h1>🍬 Acompanhar Pedido</h1>

<input
type="text"
id="pedidoId"
placeholder="Digite o ID do pedido"
style="
width:100%;
padding:15px;
border-radius:10px;
border:1px solid #ccc;
font-size:18px;
">

<button
onclick="buscarPedido()"
style="
width:100%;
margin-top:15px;
padding:15px;
border:none;
background:#25D366;
color:white;
font-size:18px;
border-radius:12px;
font-weight:bold;
cursor:pointer;
">
Buscar Pedido
</button>

<div class="status" id="status">
Aguardando pedido...
</div>

<div class="info" id="info"></div>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getDatabase,
ref,
onValue
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {

apiKey: "SUA_API",

authDomain: "SEU_AUTH",

databaseURL: "SUA_DATABASE_URL",

projectId: "SEU_PROJECT",

storageBucket: "SEU_BUCKET",

messagingSenderId: "SEU_ID",

appId: "SEU_APP_ID"

};

const app = initializeApp(firebaseConfig);

const db = getDatabase(app);

window.buscarPedido = function(){

    const id =
    document.getElementById("pedidoId").value;

    const pedidoRef =
    ref(db, "pedidos/" + id);

    onValue(pedidoRef, (snapshot)=>{

        const pedido = snapshot.val();

        if(!pedido){

            document.getElementById("status").innerHTML =
            "❌ Pedido não encontrado";

            return;

        }

        document.getElementById("info").innerHTML = `

        👤 ${pedido.nome}<br>
        ☎️ ${pedido.telefone}<br>
        💰 R$ ${Number(pedido.total).toFixed(2)}

        `;

        if(pedido.status === "novo"){

            document.getElementById("status").innerHTML =
            "🆕 Pedido recebido";

        }

        if(pedido.status === "preparo"){

            document.getElementById("status").innerHTML =
            "👨‍🍳 Pedido em preparo";

        }

        if(pedido.status === "entregue"){

            document.getElementById("status").innerHTML =
            "✅ Pedido entregue";

        }

    });

}

</script>

</body>
</html>
