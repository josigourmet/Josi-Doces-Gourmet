<style>
    :root {
        --marrom-escuro: #3e2723;

    /* ===== Login ===== */

    .botoes-status {

    .botoes-status button {

    @keyframes pulse {

</style>

<body>

<div id="telaLogin">
    <div class="selo">🍰</div>
    <h2>Painel Admin</h2>

    <div id="areaBiometria">
        <button type="button" id="btnEntrarBiometria" onclick="entrarComBiometria()">🔐 Entrar com Digital</button>
    </div>

    <a href="#" id="linkEsqueciSenha" onclick="solicitarResetSenha(); return false;">Esqueci minha senha</a>

</div>

<div id="telaDashboard">
    <header>
        <div class="header-titulo">
            <span class="bolinha-status" id="bolinhaStatus"></span>
            <div>
                <h1>🍰 Pedidos</h1>
                <div class="header-sub" id="headerSub">conectando…</div>
            </div>
        </div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, onValue, update } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";
import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyCHzkyYek4fV7fs_1f6FTA9o4o3ikJuhs0",
  authDomain: "josigourmet-af3ff.firebaseapp.com",
  databaseURL: "https://josigourmet-af3ff-default-rtdb.firebaseio.com",
  projectId: "josigourmet-af3ff",
  storageBucket: "josigourmet-af3ff.firebasestorage.app",
  messagingSenderId: "373768013260",
  appId: "1:373768013260:web:bd5fa8dcf6053414d7c969",
  measurementId: "G-XR4249E0QG"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const auth = getAuth(app);

let pedidosBrutos = {};
let filtroAtual = 'todos';

/* ============================================================
   NORMALIZAÇÃO DE PEDIDOS
   O site de pedidos já teve mais de uma versão em produção, e
   cada uma gravou os campos com nomes um pouco diferentes
   (ex: "nome" vs "cliente", "enderecoTexto" vs "bairro").
   Esta função tenta todos os nomes conhecidos, para que pedidos
   antigos e novos apareçam corretamente no painel.
   ============================================================ */
function normalizarPedido(bruto) {
    if (!bruto || typeof bruto !== 'object') bruto = {};

    const itensRaw = bruto.itens;
    let itens = [];
    if (Array.isArray(itensRaw)) itens = itensRaw;
    else if (itensRaw && typeof itensRaw === 'object') itens = Object.values(itensRaw);

    const bairroCru = bruto.bairro || '';
    const pareceRetiradaPorTexto = typeof bairroCru === 'string' && /retirar/i.test(bairroCru);

    const totalCalculado = itens.reduce(function (acc, item) {
        const preco = (item && typeof item.preco === 'number') ? item.preco : 0;
        const qtd = (item && typeof item.qtd === 'number') ? item.qtd : 1;
        return acc + preco * qtd;
    }, 0);

    const criadoEmBruto = bruto.criadoEm || bruto.statusAtualizadoEm || null;
    let criadoEmMs = null;
    if (criadoEmBruto) {
        const t = new Date(criadoEmBruto).getTime();
        criadoEmMs = isNaN(t) ? null : t;
    }

    return {
        nome: bruto.nome || bruto.cliente || '',
        telefone: bruto.telefone || bruto.whatsapp || bruto.fone || '',
        numeroPedido: bruto.numeroPedido || bruto.numero || '',
        status: bruto.status || 'recebido',
        tipoEntrega: bruto.tipoEntrega || (bruto.bairro === 'retirada' || pareceRetiradaPorTexto ? 'retirada' : 'entrega'),
        enderecoTexto: bruto.enderecoTexto || (typeof bairroCru === 'string' ? bairroCru : ''),
        endereco: bruto.endereco || '',
        data: bruto.data || '',
        hora: bruto.hora || '',
        pagamento: bruto.pagamento || '',
        itens: itens,
        total: (typeof bruto.total === 'number') ? bruto.total : totalCalculado,
        criadoEmMs: criadoEmMs,
        criadoEmBruto: criadoEmBruto
    };
}

/* ===== Biometria (WebAuthn) ===== */
function _bufParaBase64(buf) {
    return btoa(String.fromCharCode.apply(null, new Uint8Array(buf)));
}
function _base64ParaBuf(b64) {
    const bin = atob(b64);
    const arr = new Uint8Array(bin.length);
    for (let i = 0; i < bin.length; i++) arr[i] = bin.charCodeAt(i);
    return arr.buffer;
}
function _ofuscar(obj) {
    return btoa(unescape(encodeURIComponent(JSON.stringify(obj))));
}
function _desofuscar(str) {
    return JSON.parse(decodeURIComponent(escape(atob(str))));
}

const CHAVE_BIO_ID = 'josiAdminBiometriaId';
const CHAVE_BIO_CRED = 'josiAdminBiometriaCred';

function atualizarUiBiometria() {
    const jaAtivo = !!localStorage.getItem(CHAVE_BIO_ID);
    const areaLogin = document.getElementById('areaBiometria');
    if (areaLogin) areaLogin.style.display = jaAtivo ? 'block' : 'none';
    const btnDash = document.getElementById('btnToggleBiometria');
    if (btnDash) btnDash.textContent = jaAtivo ? '🔓 Remover Digital' : '🔐 Ativar Digital';
}

async function verificarSuporteBiometria() {
    const btnDash = document.getElementById('btnToggleBiometria');
    if (!window.PublicKeyCredential) { if (btnDash) btnDash.style.display = 'none'; return; }
    try {
        const suportado = await PublicKeyCredential.isUserVerifyingPlatformAuthenticatorAvailable();
        if (btnDash) btnDash.style.display = suportado ? 'inline-block' : 'none';
    } catch (e) {
        if (btnDash) btnDash.style.display = 'none';
    }
    atualizarUiBiometria();
}

async function ativarBiometriaNoAparelho(email, senha) {
    if (!window.PublicKeyCredential) {
        alert("Esse navegador não tem suporte a login por digital/Face ID.");
        return false;
    }
    try {
        const desafio = crypto.getRandomValues(new Uint8Array(32));
        const idUsuario = crypto.getRandomValues(new Uint8Array(16));
        const credencial = await navigator.credentials.create({
            publicKey: {
                challenge: desafio,
                rp: { name: "Josi Doces Gourmet - Admin" },
                user: { id: idUsuario, name: email, displayName: email },
                pubKeyCredParams: [
                    { type: "public-key", alg: -7 },
                    { type: "public-key", alg: -257 }
                ],
                authenticatorSelection: { authenticatorAttachment: "platform", userVerification: "required" },
                timeout: 60000,
                attestation: "none"
            }
        });
        if (!credencial) return false;
        localStorage.setItem(CHAVE_BIO_ID, _bufParaBase64(credencial.rawId));
        localStorage.setItem(CHAVE_BIO_CRED, _ofuscar({ email: email, senha: senha }));
        return true;
    } catch (erro) {
        console.error("Erro ao ativar biometria:", erro);
        alert("Não foi possível ativar a digital neste aparelho.");
        return false;
    }
}

window.entrarComBiometria = async function() {
    const idSalvo = localStorage.getItem(CHAVE_BIO_ID);
    const credSalva = localStorage.getItem(CHAVE_BIO_CRED);
    const erroDiv = document.getElementById('erroLogin');
    erroDiv.style.display = 'none';
    if (!idSalvo || !credSalva) return;

    try {
        const desafio = crypto.getRandomValues(new Uint8Array(32));
        const asserção = await navigator.credentials.get({
            publicKey: {
                challenge: desafio,
                allowCredentials: [{ id: _base64ParaBuf(idSalvo), type: "public-key" }],
                userVerification: "required",
                timeout: 60000
            }
        });
        if (!asserção) throw new Error("Sem resposta do leitor de digital.");

        const dados = _desofuscar(credSalva);
        await signInWithEmailAndPassword(auth, dados.email, dados.senha);
    } catch (erro) {
        console.error("Erro na autenticação por digital:", erro);
        erroDiv.textContent = "Erro biometria: " + erro.code;
        erroDiv.style.display = 'block';
    }
};

window.alternarBiometria = async function() {
    const jaAtivo = !!localStorage.getItem(CHAVE_BIO_ID);

    if (jaAtivo) {
        if (confirm("Remover o login por digital deste aparelho?")) {
            localStorage.removeItem(CHAVE_BIO_ID);
            localStorage.removeItem(CHAVE_BIO_CRED);
            atualizarUiBiometria();
        }
        return;
    }

    if (!auth.currentUser) return;
    const senha = prompt("Para ativar a digital neste aparelho, confirme sua senha atual:");
    if (!senha) return;

    const sucesso = await ativarBiometriaNoAparelho(auth.currentUser.email, senha);
    if (sucesso) alert("Digital ativada neste aparelho! 🎉");
    atualizarUiBiometria();
};

/* ===== Login / logout / reset ===== */
window.solicitarResetSenha = function() {
    const email = document.getElementById('loginEmail').value.trim();
    const msgDiv = document.getElementById('msgReset');

    if (!email) {
        msgDiv.style.color = '#c0392b';
        msgDiv.textContent = "Digite seu e-mail no campo acima e clique em \"Esqueci minha senha\" de novo.";
        msgDiv.style.display = 'block';
        return;
    }

    sendPasswordResetEmail(auth, email).then(function() {
        msgDiv.style.color = '#2e7d32';
        msgDiv.textContent = "Se esse e-mail estiver cadastrado, enviamos um link para redefinir a senha.";
        msgDiv.style.display = 'block';
    }).catch(function(erro) {
        console.error("Erro ao enviar e-mail de redefinição:", erro);
        msgDiv.style.color = '#2e7d32';
        msgDiv.textContent = "Se esse e-mail estiver cadastrado, enviamos um link para redefinir a senha.";
        msgDiv.style.display = 'block';
    });
};

window.fazerLogin = function() {
    const email = document.getElementById('loginEmail').value.trim();
    const senha = document.getElementById('loginSenha').value;
    const erroDiv = document.getElementById('erroLogin');
    erroDiv.style.display = 'none';

    signInWithEmailAndPassword(auth, email, senha).catch(function(erro) {
        console.error("Erro detalhado do Firebase:", erro.code, erro.message);
        erroDiv.textContent = "Erro: " + erro.code;
        erroDiv.style.display = 'block';
    });
};

window.fazerLogout = function() {
    signOut(auth);
};

let pararDeEscutar = null;

onAuthStateChanged(auth, function(usuario) {
    if (usuario) {
        document.getElementById('telaLogin').style.display = 'none';
        document.getElementById('telaDashboard').style.display = 'block';
        verificarSuporteBiometria();
        escutarPedidos();
    } else {
        document.getElementById('telaLogin').style.display = 'block';
        document.getElementById('telaDashboard').style.display = 'none';
        atualizarUiBiometria();
        if (pararDeEscutar) { pararDeEscutar(); pararDeEscutar = null; }
    }
});

/* ===== Status de conexão (diagnóstico visível na tela) ===== */
function definirStatusConexao(estado, detalhe) {
    const bolinha = document.getElementById('bolinhaStatus');
    const sub = document.getElementById('headerSub');
    const banner = document.getElementById('bannerDiagnostico');

    bolinha.className = 'bolinha-status';
    banner.style.display = 'none';

    if (estado === 'carregando') {
        bolinha.classList.add('carregando');
        sub.textContent = 'conectando…';
    } else if (estado === 'ok') {
        bolinha.classList.add('ok');
        const n = Object.keys(pedidosBrutos || {}).length;
        sub.textContent = n === 1 ? '1 pedido carregado' : n + ' pedidos carregados';
    } else if (estado === 'erro') {
        bolinha.classList.add('erro');
        sub.textContent = 'erro de conexão';
        banner.style.display = 'block';
        banner.innerHTML = '<b>⚠️ Não foi possível carregar os pedidos</b>'
            + 'O painel conectou, mas o banco de dados recusou a leitura. Isso normalmente é causado pelas Regras (Rules) do Realtime Database no Firebase Console — verifique se a leitura em <code>pedidos</code> está liberada para usuários autenticados.'
            + '<code>' + (detalhe || 'erro desconhecido') + '</code>';
    }
}

function escutarPedidos() {
    definirStatusConexao('carregando');
    const pedidosRef = ref(db, 'pedidos');
    pararDeEscutar = onValue(
        pedidosRef,
        function(snapshot) {
            pedidosBrutos = snapshot.val() || {};
            definirStatusConexao('ok');
            window.renderizarPedidos();
        },
        function(erro) {
            console.error("Erro ao ler pedidos do Firebase:", erro);
            pedidosBrutos = {};
            definirStatusConexao('erro', erro.code + ': ' + erro.message);
            window.renderizarPedidos();
        }
    );
}

document.getElementById('filtros').addEventListener('click', function(e) {
    const btn = e.target.closest('.filtro-btn');
    if (!btn) return;
    document.querySelectorAll('.filtro-btn').forEach(b => b.classList.remove('ativo'));
    btn.classList.add('ativo');
    filtroAtual = btn.dataset.filtro;
    window.renderizarPedidos();
});

const STATUS_INFO = {
    recebido:         { label: 'Recebido',            cor: '#8d6e63' },
    preparo:          { label: 'Em Preparo',          cor: '#c8860a' },
    saiu_entrega:      { label: 'Saiu p/ Entrega',      cor: '#009ee3' },
    pronto_retirada:   { label: 'Pronto p/ Retirada',   cor: '#009ee3' },
    finalizado:        { label: 'Finalizado',           cor: '#25D366' }
};

function formatarTelefoneWhats(tel) {
    const digitos = (tel || '').replace(/\D/g, '');
    if (digitos.length === 11 || digitos.length === 10) return '55' + digitos;
    return digitos;
}

function mensagemParaStatus(status, pedido) {
    const nome = pedido.nome || 'Cliente';
    const numero = pedido.numeroPedido || '';
    switch (status) {
        case 'recebido':
            return `Oi ${nome}! 🍰 Recebemos seu pedido #${numero} com sucesso! Já vamos começar a preparar tudo com muito carinho. Obrigada pela confiança! 🤎✨`;
        case 'preparo':
            return `Oi ${nome}! 👩‍🍳 Seu pedido #${numero} já está sendo preparado! Em breve fica pronto. 🍰✨`;
        case 'saiu_entrega':
            return `Oi ${nome}! 🚚 Seu pedido #${numero} saiu para entrega! Chega bem quentinho até você. 🤎`;
        case 'pronto_retirada':
            return `Oi ${nome}! 📦 Seu pedido #${numero} está pronto para retirada! Pode vir buscar quando quiser, estamos te esperando. 🍰`;
        case 'finalizado':
            return pedido.tipoEntrega === 'retirada'
                ? `Oi ${nome}! ✅ Confirmamos que seu pedido #${numero} foi retirado! Esperamos que aproveite muito. Obrigada pela preferência, volte sempre! ❤️`
                : `Oi ${nome}! ✅ Seu pedido #${numero} foi entregue! Esperamos que aproveite muito. Obrigada pela preferência, volte sempre! ❤️`;
        default:
            return `Oi ${nome}! Atualização sobre o seu pedido #${numero}. 🍰`;
    }
}

window.atualizarStatus = function(pedidoId, novoStatus) {
    const bruto = pedidosBrutos[pedidoId];
    if (!bruto) return;
    const pedido = normalizarPedido(bruto);

    update(ref(db, 'pedidos/' + pedidoId), {
        status: novoStatus,
        statusAtualizadoEm: Date.now()
    });

    const texto = mensagemParaStatus(novoStatus, pedido);
    const numeroWhats = formatarTelefoneWhats(pedido.telefone);
    const url = `https://wa.me/${numeroWhats}?text=${encodeURIComponent(texto)}`;
    window.open(url, '_blank');
};

window.enviarMensagemAvulsa = function(pedidoId) {
    const bruto = pedidosBrutos[pedidoId];
    if (!bruto) return;
    const pedido = normalizarPedido(bruto);
    const numeroWhats = formatarTelefoneWhats(pedido.telefone);
    window.open(`https://wa.me/${numeroWhats}`, '_blank');
};

/* ============================================================
   BADGES DE PENDENTES NAS ABAS
   Conta quantos pedidos existem em cada status (exceto
   "finalizado") e exibe uma bolinha vermelha em cima de cada
   aba de filtro. A aba "Recebidos" pisca, para chamar atenção
   imediata de um pedido novo chegando.
   ============================================================ */
function atualizarBadgesFiltros() {
    const contagens = { recebido: 0, preparo: 0, saiu_entrega: 0, pronto_retirada: 0, finalizado: 0 };
    Object.values(pedidosBrutos || {}).forEach(function(bruto) {
        const pedido = normalizarPedido(bruto);
        if (contagens.hasOwnProperty(pedido.status)) contagens[pedido.status]++;
    });
    const pendentesTotal = contagens.recebido + contagens.preparo + contagens.saiu_entrega + contagens.pronto_retirada;

    document.querySelectorAll('.filtro-btn').forEach(function(btn) {
        const chave = btn.dataset.filtro;
        const valor = chave === 'todos' ? pendentesTotal : (contagens[chave] || 0);
        let badge = btn.querySelector('.filtro-badge');

        if (valor > 0) {
            if (!badge) {
                badge = document.createElement('span');
                badge.className = 'filtro-badge';
                btn.appendChild(badge);
            }
            badge.textContent = valor;
            badge.classList.toggle('piscando', chave === 'recebido');
        } else if (badge) {
            badge.remove();
        }
    });
}

window.renderizarPedidos = function() {
    atualizarBadgesFiltros();

    const lista = document.getElementById('listaPedidos');
    const contador = document.getElementById('contadorResultado');
    const busca = (document.getElementById('buscaPedido').value || '').toLowerCase().trim();

    const totalNoBanco = Object.keys(pedidosBrutos || {}).length;

    let entradas = Object.entries(pedidosBrutos || {}).map(function(entrada) {
        return [entrada[0], normalizarPedido(entrada[1])];
    });

    entradas.sort(function(a, b) {
        return (b[1].criadoEmMs || 0) - (a[1].criadoEmMs || 0);
    });

    entradas = entradas.filter(function(entrada) {
        const pedido = entrada[1];
        if (filtroAtual !== 'todos' && pedido.status !== filtroAtual) return false;
        if (busca) {
            const alvo = `${pedido.nome} ${pedido.numeroPedido}`.toLowerCase();
            if (!alvo.includes(busca)) return false;
        }
        return true;
    });

    contador.textContent = totalNoBanco === 0 ? '' :
        entradas.length + ' de ' + totalNoBanco + ' pedido' + (totalNoBanco === 1 ? '' : 's');

    if (totalNoBanco === 0) {
        lista.innerHTML = '';
        const vazio = document.createElement('div');
        vazio.className = 'vazio';
        vazio.innerHTML = '<span class="vazio-emoji">📭</span><b>Nenhum pedido no banco ainda</b>Assim que um cliente finalizar um pedido pelo site, ele aparece aqui automaticamente — não precisa atualizar a página.';
        lista.appendChild(vazio);
        return;
    }

    if (entradas.length === 0) {
        lista.innerHTML = '';
        const vazio = document.createElement('div');
        vazio.className = 'vazio';
        vazio.innerHTML = '<span class="vazio-emoji">🔍</span><b>Nada encontrado</b>Nenhum pedido bate com esse filtro ou termo de busca. Tente limpar a busca ou escolher "Todos".';
        lista.appendChild(vazio);
        return;
    }

    lista.innerHTML = '';
    entradas.forEach(function(entrada) {
        const id = entrada[0];
        const pedido = entrada[1];
        lista.appendChild(criarCardPedido(id, pedido));
    });
};

function formatarDataHoraCriacao(ms) {
    if (!ms) return '';
    try { return new Date(ms).toLocaleString('pt-BR'); } catch(e) { return ''; }
}

function criarCardPedido(id, pedido) {
    const info = STATUS_INFO[pedido.status] || STATUS_INFO.recebido;
    const tipoEntrega = pedido.tipoEntrega;

    const card = document.createElement('div');
    const ehPendente = pedido.status !== 'finalizado';
    card.className = 'pedido-card' + (ehPendente ? ' pendente' : '');

    const itensHtml = pedido.itens.length
        ? pedido.itens.map(function(item) {
            const nomeItem = (item && item.nome) ? item.nome : 'Item';
            const qtd = (item && typeof item.qtd === 'number') ? item.qtd : 1;
            const preco = (item && typeof item.preco === 'number') ? item.preco : 0;
            return `<div>${qtd}x ${nomeItem} — R$ ${(preco * qtd).toFixed(2).replace('.', ',')}</div>`;
        }).join('')
        : '<div class="campo-ausente">Itens não identificados neste pedido</div>';

    const enderecoLinha = tipoEntrega === 'retirada'
        ? 'Retirada no local'
        : ((pedido.enderecoTexto || '') + (pedido.endereco ? ' — ' + pedido.endereco : '')) || '<span class="campo-ausente">endereço não informado</span>';

    const nomeExibido = pedido.nome || '<span class="campo-ausente">nome não informado</span>';
    const telExibido = pedido.telefone || '<span class="campo-ausente">sem telefone</span>';
    const numeroExibido = pedido.numeroPedido || '<span class="campo-ausente">s/n°</span>';

    card.innerHTML = `
        <div class="pedido-topo">
            <div>
                <div class="pedido-numero"><span>#</span>${numeroExibido}${ehPendente ? '<span class="selo-pendente">PENDENTE</span>' : ''}</div>
                <div class="pedido-data">${formatarDataHoraCriacao(pedido.criadoEmMs)}</div>
            </div>
            <span class="status-badge" style="background:${info.cor}">${info.label}</span>
        </div>
        <div class="pedido-info">
            <div>👤 <b>${nomeExibido}</b> — 📱 ${telExibido}</div>
            <div>📍 ${enderecoLinha}</div>
            <div>⏰ ${pedido.data || '—'} às ${pedido.hora || '—'}</div>
            <div>💳 ${pedido.pagamento || '<span class="campo-ausente">não informado</span>'}</div>
        </div>
        <div class="pedido-itens">${itensHtml}</div>
        <div class="pedido-total">Total: R$ ${pedido.total.toFixed(2).replace('.', ',')}</div>
        <div class="botoes-status" data-id="${id}" data-tipo="${tipoEntrega}"></div>
        <button class="btn-whats-mini" data-acao="conversar" data-id="${id}">💬 Falar no WhatsApp</button>
    `;

    const botoesDiv = card.querySelector('.botoes-status');
    const etapas = tipoEntrega === 'retirada'
        ? [['recebido','Recebido'], ['preparo','Em Preparo'], ['pronto_retirada','Pronto p/ Retirada'], ['finalizado','Retirado']]
        : [['recebido','Recebido'], ['preparo','Em Preparo'], ['saiu_entrega','Saiu p/ Entrega'], ['finalizado','Entregue']];

    etapas.forEach(function(etapa) {
        const btn = document.createElement('button');
        btn.textContent = etapa[1];
        if (pedido.status === etapa[0]) btn.classList.add('ativo');
        btn.onclick = function() { window.atualizarStatus(id, etapa[0]); };
        botoesDiv.appendChild(btn);
    });

    card.querySelector('[data-acao="conversar"]').onclick = function() {
        window.enviarMensagemAvulsa(id);
    };

    return card;
}

atualizarUiBiometria();
</script>
