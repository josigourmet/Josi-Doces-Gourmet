<html lang="pt-br">

<title>Painel Admin - Josi Doces Gourmet</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Lato:wght@400;700&display=swap" rel="stylesheet">
<style>
    :root {
        --marrom-escuro: #3e2723;
        --marrom-medio: #5d4037;
        --marrom-claro: #8d6e63;
        --creme-escuro: #d7ccc8;
        --creme-medio: #efebe9;
        --creme-fundo: #fdf5e6;
        --verde-whats: #25D366;
        --destaque: #c8860a;
        --azul: #009ee3;
    }
    * { box-sizing: border-box; }
    body {
        font-family: 'Lato', Arial, sans-serif;
        margin: 0;
        background: var(--creme-fundo);
        color: var(--marrom-escuro);
    }
    header {
        background: linear-gradient(135deg, var(--marrom-escuro), var(--marrom-medio));
        color: #fff;
        padding: 16px 20px;
        display: flex;
        align-items: center;
        justify-content: space-between;
    }
    header h1 {
        font-family: 'Playfair Display', serif;
        font-size: 18px;
        margin: 0;
    }
    .header-botoes {
        display: flex;
        gap: 8px;
        align-items: center;
    }
    header button {
        background: rgba(255,255,255,0.15);
        color: #fff;
        border: 1px solid rgba(255,255,255,0.3);
        padding: 8px 14px;
        border-radius: 10px;
        cursor: pointer;
        font-weight: 700;
        font-size: 13px;
        white-space: nowrap;
    }
    #btnToggleSom.som-desligado {
        background: rgba(231,76,60,0.35);
        border-color: rgba(231,76,60,0.6);
    }

    /* ===== Login ===== */
    #telaLogin {
        max-width: 360px;
        margin: 60px auto;
        background: #fff;
        padding: 28px 24px;
        border-radius: 20px;
        box-shadow: 0 6px 25px rgba(62,39,35,0.15);
        text-align: center;
    }
    #telaLogin h2 {
        font-family: 'Playfair Display', serif;
        color: var(--marrom-medio);
        margin-top: 0;
    }
    #telaLogin input {
        width: 100%;
        padding: 12px 14px;
        margin-top: 10px;
        border-radius: 10px;
        border: 1.5px solid var(--creme-escuro);
        font-size: 15px;
    }
    #telaLogin button {
        width: 100%;
        margin-top: 16px;
        padding: 12px;
        border-radius: 10px;
        border: none;
        background: linear-gradient(135deg, var(--marrom-medio), var(--marrom-escuro));
        color: #fff;
        font-weight: 700;
        font-size: 15px;
        cursor: pointer;
    }
    #erroLogin {
        color: #e74c3c;
        font-size: 13px;
        font-weight: 700;
        margin-top: 10px;
        display: none;
        word-break: break-all;
    }
    #areaBiometria {
        display: none;
        margin-top: 14px;
    }
    #btnEntrarBiometria {
        background: linear-gradient(135deg, var(--azul), #0077b3) !important;
        width: 100%;
        padding: 12px;
        border-radius: 10px;
        border: none;
        color: #fff;
        font-weight: 700;
        font-size: 14px;
        cursor: pointer;
    }
    #linkEsqueciSenha {
        display: block;
        margin-top: 14px;
        font-size: 12.5px;
        color: var(--marrom-claro);
        font-weight: 700;
        text-decoration: none;
        cursor: pointer;
    }
    #linkEsqueciSenha:hover { text-decoration: underline; }
    #msgReset {
        font-size: 12.5px;
        margin-top: 10px;
        display: none;
        font-weight: 700;
        line-height: 1.5;
    }

    /* ===== Dashboard ===== */
    #telaDashboard { display: none; }

    .filtros {
        display: flex;
        gap: 8px;
        overflow-x: auto;
        padding: 14px 16px;
        background: #fff;
        border-bottom: 1px solid var(--creme-escuro);
    }
    .filtro-btn {
        white-space: nowrap;
        padding: 8px 14px;
        border-radius: 20px;
        border: 1.5px solid var(--creme-escuro);
        background: var(--creme-medio);
        color: var(--marrom-medio);
        font-weight: 700;
        font-size: 13px;
        cursor: pointer;
    }
    .filtro-btn.ativo {
        background: var(--marrom-medio);
        color: #fff;
        border-color: var(--marrom-medio);
    }

    .busca-area {
        padding: 10px 16px;
        background: #fff;
        border-bottom: 1px solid var(--creme-escuro);
    }
    .busca-area input {
        width: 100%;
        padding: 10px 14px;
        border-radius: 10px;
        border: 1.5px solid var(--creme-escuro);
        font-size: 14px;
    }

    #listaPedidos {
        max-width: 700px;
        margin: 0 auto;
        padding: 16px;
    }

    .pedido-card {
        background: #fff;
        border-radius: 16px;
        padding: 16px;
        margin-bottom: 14px;
        box-shadow: 0 3px 14px rgba(62,39,35,0.08);
        border: 1px solid rgba(215,204,200,0.5);
    }
    .pedido-card.pedido-novo {
        border: 2px solid var(--destaque);
        animation: piscarNovo 1.1s ease-in-out 4;
    }
    @keyframes piscarNovo {
        0%, 100% { box-shadow: 0 3px 14px rgba(62,39,35,0.08); background: #fff; }
        50% { box-shadow: 0 0 0 8px rgba(200,134,10,0.30); background: #fff8e1; }
    }
    .pedido-topo {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        margin-bottom: 8px;
    }
    .pedido-numero {
        font-family: 'Playfair Display', serif;
        font-size: 17px;
        color: var(--marrom-escuro);
        font-weight: 700;
    }
    .tag-novo-pedido {
        display: inline-block;
        background: var(--destaque);
        color: #fff;
        font-size: 10px;
        font-weight: 700;
        padding: 2px 8px;
        border-radius: 10px;
        margin-left: 6px;
        vertical-align: middle;
        letter-spacing: 0.4px;
    }
    .pedido-data { font-size: 11px; color: var(--marrom-claro); }
    .status-badge {
        display: inline-block;
        padding: 4px 10px;
        border-radius: 12px;
        font-size: 11px;
        font-weight: 700;
        color: #fff;
        margin-top: 4px;
    }
    .pedido-info { font-size: 13.5px; line-height: 1.6; margin: 8px 0; }
    .pedido-info b { color: var(--marrom-medio); }
    .pedido-itens {
        background: var(--creme-medio);
        border-radius: 10px;
        padding: 8px 12px;
        font-size: 13px;
        margin: 8px 0;
    }
    .pedido-itens div { padding: 2px 0; }
    .pedido-total {
        font-weight: 700;
        font-size: 15px;
        color: var(--destaque);
        margin-top: 6px;
    }
    .botoes-status {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        margin-top: 12px;
    }
    .botoes-status button {
        flex: 1;
        min-width: 120px;
        padding: 9px 8px;
        border-radius: 10px;
        border: 1.5px solid var(--creme-escuro);
        background: var(--creme-medio);
        color: var(--marrom-escuro);
        font-weight: 700;
        font-size: 12px;
        cursor: pointer;
    }
    .botoes-status button.ativo {
        background: var(--verde-whats);
        color: #fff;
        border-color: var(--verde-whats);
    }
    .btn-whats-mini {
        background: var(--verde-whats) !important;
        color: #fff !important;
        border: none !important;
        width: 100%;
        margin-top: 8px;
        padding: 10px;
        border-radius: 10px;
        font-weight: 700;
        font-size: 13px;
        cursor: pointer;
    }
    .vazio {
        text-align: center;
        color: var(--marrom-claro);
        padding: 40px 20px;
        font-size: 14px;
    }
</style>
</head>
<body>

<div id="telaLogin">
    <h2>🍰 Painel Admin</h2>
    <p style="font-size:13px; color:#777;">Josi Doces Gourmet</p>
    <input type="email" id="loginEmail" placeholder="E-mail" autocomplete="username">
    <input type="password" id="loginSenha" placeholder="Senha" autocomplete="current-password">
    <button onclick="fazerLogin()">Entrar</button>
    <div id="erroLogin"></div>

    <div id="areaBiometria">
        <button type="button" id="btnEntrarBiometria" onclick="entrarComBiometria()">🔐 Entrar com Digital</button>
    </div>

    <a href="#" id="linkEsqueciSenha" onclick="solicitarResetSenha(); return false;">Esqueci minha senha</a>
    <div id="msgReset"></div>
</div>

<div id="telaDashboard">
    <header>
        <h1>🍰 Pedidos - Josi Doces</h1>
        <div class="header-botoes">
            <button id="btnToggleSom" onclick="alternarSom()" title="Ligar/desligar som de novo pedido">🔔 Som</button>
            <button id="btnToggleBiometria" onclick="alternarBiometria()" style="display:none;">🔐 Ativar Digital</button>
            <button onclick="fazerLogout()">Sair</button>
        </div>
    </header>

    <div class="filtros" id="filtros">
        <button class="filtro-btn ativo" data-filtro="todos">Todos</button>
        <button class="filtro-btn" data-filtro="recebido">Recebidos</button>
        <button class="filtro-btn" data-filtro="preparo">Em Preparo</button>
        <button class="filtro-btn" data-filtro="saiu_entrega">Saiu p/ Entrega</button>
        <button class="filtro-btn" data-filtro="pronto_retirada">Pronto p/ Retirada</button>
        <button class="filtro-btn" data-filtro="finalizado">Finalizados</button>
    </div>

    <div class="busca-area">
        <input type="text" id="buscaPedido" placeholder="🔍 Buscar por nome ou número do pedido..." oninput="renderizarPedidos()">
    </div>

    <div id="listaPedidos"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, onValue, update } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";
import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyCHzkyYek4fV7fs_1f6FTA9o4o3ikJuhs0",
  authDomain: "josigourmet-af3ff.firebaseapp.com",
  databaseURL: "https://josigourmet-af3ff-default-rtdb.firebaseio.com",
  projectId: "josigourmet-af3ff",
  storageBucket: "josigourmet-af3ff.firebasestorage.app",
  messagingSenderId: "373768013260",
  appId: "1:373768013260:web:bd5fa8dcf6053414d7c969",
  measurementId: "G-XR4249E0QG"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const auth = getAuth(app);

let todosOsPedidos = {};
let filtroAtual = 'todos';

/* ===== Notificação de pedido novo (som + destaque + título) ===== */
const CHAVE_SOM = 'josiAdminSomAtivo';
let somAtivo = localStorage.getItem(CHAVE_SOM) !== '0';
let idsConhecidos = null; // null = ainda não carregou nada
let idsRecemChegados = new Set();
let tituloOriginal = document.title;
let intervaloPiscarTitulo = null;

function tocarBipNotificacao() {
    if (!somAtivo) return;
    try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        [0, 0.22].forEach(function(atraso) {
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.connect(gain);
            gain.connect(ctx.destination);
            osc.type = 'sine';
            const inicio = ctx.currentTime + atraso;
            osc.frequency.setValueAtTime(880, inicio);
            gain.gain.setValueAtTime(0.001, inicio);
            gain.gain.exponentialRampToValueAtTime(0.35, inicio + 0.02);
            gain.gain.exponentialRampToValueAtTime(0.001, inicio + 0.32);
            osc.start(inicio);
            osc.stop(inicio + 0.35);
        });
    } catch (e) {
        console.error("Erro ao tocar som de notificação:", e);
    }
}

function piscarTituloAba(qtdNovos) {
    if (intervaloPiscarTitulo) clearInterval(intervaloPiscarTitulo);
    let ligado = true;
    intervaloPiscarTitulo = setInterval(function() {
        document.title = ligado ? `🔔 ${qtdNovos} novo(s) pedido(s)!` : tituloOriginal;
        ligado = !ligado;
    }, 1000);
    setTimeout(function() {
        clearInterval(intervaloPiscarTitulo);
        intervaloPiscarTitulo = null;
        document.title = tituloOriginal;
    }, 10000);
}

function notificarNavegador(qtdNovos) {
    if (!("Notification" in window)) return;
    if (Notification.permission === "granted") {
        new Notification("🍰 Josi Doces - Novo pedido!", {
            body: qtdNovos === 1 ? "Chegou 1 novo pedido." : `Chegaram ${qtdNovos} novos pedidos.`
        });
    } else if (Notification.permission !== "denied") {
        Notification.requestPermission();
    }
}

window.alternarSom = function() {
    somAtivo = !somAtivo;
    localStorage.setItem(CHAVE_SOM, somAtivo ? '1' : '0');
    atualizarBotaoSom();
    if (somAtivo) tocarBipNotificacao();
};

function atualizarBotaoSom() {
    const btn = document.getElementById('btnToggleSom');
    if (!btn) return;
    btn.textContent = somAtivo ? '🔔 Som Ligado' : '🔕 Som Desligado';
    btn.classList.toggle('som-desligado', !somAtivo);
}

function _bufParaBase64(buf) {
    return btoa(String.fromCharCode.apply(null, new Uint8Array(buf)));
}
function _base64ParaBuf(b64) {
    const bin = atob(b64);
    const arr = new Uint8Array(bin.length);
    for (let i = 0; i < bin.length; i++) arr[i] = bin.charCodeAt(i);
    return arr.buffer;
}
function _ofuscar(obj) {
    return btoa(unescape(encodeURIComponent(JSON.stringify(obj))));
}
function _desofuscar(str) {
    return JSON.parse(decodeURIComponent(escape(atob(str))));
}

const CHAVE_BIO_ID = 'josiAdminBiometriaId';
const CHAVE_BIO_CRED = 'josiAdminBiometriaCred';

function atualizarUiBiometria() {
    const jaAtivo = !!localStorage.getItem(CHAVE_BIO_ID);
    const areaLogin = document.getElementById('areaBiometria');
    if (areaLogin) areaLogin.style.display = jaAtivo ? 'block' : 'none';
    const btnDash = document.getElementById('btnToggleBiometria');
    if (btnDash) btnDash.textContent = jaAtivo ? '🔓 Remover Digital' : '🔐 Ativar Digital';
}

async function verificarSuporteBiometria() {
    const btnDash = document.getElementById('btnToggleBiometria');
    if (!window.PublicKeyCredential) { if (btnDash) btnDash.style.display = 'none'; return; }
    try {
        const suportado = await PublicKeyCredential.isUserVerifyingPlatformAuthenticatorAvailable();
        if (btnDash) btnDash.style.display = suportado ? 'inline-block' : 'none';
    } catch (e) {
        if (btnDash) btnDash.style.display = 'none';
    }
    atualizarUiBiometria();
}

async function ativarBiometriaNoAparelho(email, senha) {
    if (!window.PublicKeyCredential) {
        alert("Esse navegador não tem suporte a login por digital/Face ID.");
        return false;
    }
    try {
        const desafio = crypto.getRandomValues(new Uint8Array(32));
        const idUsuario = crypto.getRandomValues(new Uint8Array(16));
        const credencial = await navigator.credentials.create({
            publicKey: {
                challenge: desafio,
                rp: { name: "Josi Doces Gourmet - Admin" },
                user: { id: idUsuario, name: email, displayName: email },
                pubKeyCredParams: [
                    { type: "public-key", alg: -7 },
                    { type: "public-key", alg: -257 }
                ],
                authenticatorSelection: { authenticatorAttachment: "platform", userVerification: "required" },
                timeout: 60000,
                attestation: "none"
            }
        });
        if (!credencial) return false;
        localStorage.setItem(CHAVE_BIO_ID, _bufParaBase64(credencial.rawId));
        localStorage.setItem(CHAVE_BIO_CRED, _ofuscar({ email: email, senha: senha }));
        return true;
    } catch (erro) {
        console.error("Erro ao ativar biometria:", erro);
        alert("Não foi possível ativar a digital neste aparelho.");
        return false;
    }
}

window.entrarComBiometria = async function() {
    const idSalvo = localStorage.getItem(CHAVE_BIO_ID);
    const credSalva = localStorage.getItem(CHAVE_BIO_CRED);
    const erroDiv = document.getElementById('erroLogin');
    erroDiv.style.display = 'none';
    if (!idSalvo || !credSalva) return;

    try {
        const desafio = crypto.getRandomValues(new Uint8Array(32));
        const asserção = await navigator.credentials.get({
            publicKey: {
                challenge: desafio,
                allowCredentials: [{ id: _base64ParaBuf(idSalvo), type: "public-key" }],
                userVerification: "required",
                timeout: 60000
            }
        });
        if (!asserção) throw new Error("Sem resposta do leitor de digital.");

        const dados = _desofuscar(credSalva);
        await signInWithEmailAndPassword(auth, dados.email, dados.senha);
    } catch (erro) {
        console.error("Erro na autenticação por digital:", erro);
        erroDiv.textContent = "Erro biometria: " + erro.code;
        erroDiv.style.display = 'block';
    }
};

window.alternarBiometria = async function() {
    const jaAtivo = !!localStorage.getItem(CHAVE_BIO_ID);

    if (jaAtivo) {
        if (confirm("Remover o login por digital deste aparelho?")) {
            localStorage.removeItem(CHAVE_BIO_ID);
            localStorage.removeItem(CHAVE_BIO_CRED);
            atualizarUiBiometria();
        }
        return;
    }

    if (!auth.currentUser) return;
    const senha = prompt("Para ativar a digital neste aparelho, confirme sua senha atual:");
    if (!senha) return;

    const sucesso = await ativarBiometriaNoAparelho(auth.currentUser.email, senha);
    if (sucesso) alert("Digital ativada neste aparelho! 🎉");
    atualizarUiBiometria();
};

window.solicitarResetSenha = function() {
    const email = document.getElementById('loginEmail').value.trim();
    const msgDiv = document.getElementById('msgReset');

    if (!email) {
        msgDiv.style.color = '#e74c3c';
        msgDiv.textContent = "Digite seu e-mail no campo acima e clique em \"Esqueci minha senha\" de novo.";
        msgDiv.style.display = 'block';
        return;
    }

    sendPasswordResetEmail(auth, email).then(function() {
        msgDiv.style.color = '#2e7d32';
        msgDiv.textContent = "Se esse e-mail estiver cadastrado, enviamos um link para redefinir a senha.";
        msgDiv.style.display = 'block';
    }).catch(function(erro) {
        console.error("Erro ao enviar e-mail de redefinição:", erro);
        msgDiv.style.color = '#2e7d32';
        msgDiv.textContent = "Se esse e-mail estiver cadastrado, enviamos um link para redefinir a senha.";
        msgDiv.style.display = 'block';
    });
};

window.fazerLogin = function() {
    const email = document.getElementById('loginEmail').value.trim();
    const senha = document.getElementById('loginSenha').value;
    const erroDiv = document.getElementById('erroLogin');
    erroDiv.style.display = 'none';

    signInWithEmailAndPassword(auth, email, senha).catch(function(erro) {
        console.error("Erro detalhado do Firebase:", erro.code, erro.message);
        erroDiv.textContent = "Erro: " + erro.code;
        erroDiv.style.display = 'block';
    });
};

window.fazerLogout = function() {
    signOut(auth);
};

onAuthStateChanged(auth, function(usuario) {
    if (usuario) {
        document.getElementById('telaLogin').style.display = 'none';
        document.getElementById('telaDashboard').style.display = 'block';
        verificarSuporteBiometria();
        atualizarBotaoSom();
        if ("Notification" in window && Notification.permission === "default") {
            Notification.requestPermission();
        }
        escutarPedidos();
    } else {
        document.getElementById('telaLogin').style.display = 'block';
        document.getElementById('telaDashboard').style.display = 'none';
        atualizarUiBiometria();
    }
});

function escutarPedidos() {
    const pedidosRef = ref(db, 'pedidos');
    onValue(pedidosRef, function(snapshot) {
        const novosDados = snapshot.val() || {};
        const idsAgora = Object.keys(novosDados);

        if (idsConhecidos !== null) {
            const chegaramAgora = idsAgora.filter(function(id) { return !idsConhecidos.has(id); });
            if (chegaramAgora.length > 0) {
                idsRecemChegados = new Set(chegaramAgora);
                tocarBipNotificacao();
                piscarTituloAba(chegaramAgora.length);
                notificarNavegador(chegaramAgora.length);
            }
        }

        idsConhecidos = new Set(idsAgora);
        todosOsPedidos = novosDados;
        window.renderizarPedidos();
    });
}

document.getElementById('filtros').addEventListener('click', function(e) {
    const btn = e.target.closest('.filtro-btn');
    if (!btn) return;
    document.querySelectorAll('.filtro-btn').forEach(b => b.classList.remove('ativo'));
    btn.classList.add('ativo');
    filtroAtual = btn.dataset.filtro;
    window.renderizarPedidos();
});

const STATUS_INFO = {
    recebido:         { label: 'Recebido',            cor: '#8d6e63' },
    preparo:          { label: 'Em Preparo',          cor: '#c8860a' },
    saiu_entrega:      { label: 'Saiu p/ Entrega',      cor: '#009ee3' },
    pronto_retirada:   { label: 'Pronto p/ Retirada',   cor: '#009ee3' },
    finalizado:        { label: 'Finalizado',           cor: '#25D366' }
};

function formatarTelefoneWhats(tel) {
    const digitos = (tel || '').replace(/\D/g, '');
    if (digitos.length === 11 || digitos.length === 10) return '55' + digitos;
    return digitos;
}

function mensagemParaStatus(status, pedido) {
    const nome = pedido.nome || 'Cliente';
    const numero = pedido.numeroPedido || '';
    switch (status) {
        case 'recebido':
            return `Oi ${nome}! 🍰 Recebemos seu pedido #${numero} com sucesso! Já vamos começar a preparar tudo com muito carinho. Obrigada pela confiança! 🤎✨`;
        case 'preparo':
            return `Oi ${nome}! 👩‍🍳 Seu pedido #${numero} já está sendo preparado! Em breve fica pronto. 🍰✨`;
        case 'saiu_entrega':
            return `Oi ${nome}! 🚚 Seu pedido #${numero} saiu para entrega! Chega bem quentinho até você. 🤎`;
        case 'pronto_retirada':
            return `Oi ${nome}! 📦 Seu pedido #${numero} está pronto para retirada! Pode vir buscar quando quiser, estamos te esperando. 🍰`;
        case 'finalizado':
            return pedido.tipoEntrega === 'retirada'
                ? `Oi ${nome}! ✅ Confirmamos que seu pedido #${numero} foi retirado! Esperamos que aproveite muito. Obrigada pela preferência, volte sempre! ❤️`
                : `Oi ${nome}! ✅ Seu pedido #${numero} foi entregue! Esperamos que aproveite muito. Obrigada pela preferência, volte sempre! ❤️`;
        default:
            return `Oi ${nome}! Atualização sobre o seu pedido #${numero}. 🍰`;
    }
}

window.atualizarStatus = function(pedidoId, novoStatus) {
    const pedido = todosOsPedidos[pedidoId];
    if (!pedido) return;

    update(ref(db, 'pedidos/' + pedidoId), {
        status: novoStatus,
        statusAtualizadoEm: Date.now()
    });

    const texto = mensagemParaStatus(novoStatus, pedido);
    const numeroWhats = formatarTelefoneWhats(pedido.telefone);
    const url = `https://wa.me/${numeroWhats}?text=${encodeURIComponent(texto)}`;
    window.open(url, '_blank');
};

window.enviarMensagemAvulsa = function(pedidoId) {
    const pedido = todosOsPedidos[pedidoId];
    if (!pedido) return;
    const numeroWhats = formatarTelefoneWhats(pedido.telefone);
    window.open(`https://wa.me/${numeroWhats}`, '_blank');
};

window.renderizarPedidos = function() {
    const lista = document.getElementById('listaPedidos');
    const busca = (document.getElementById('buscaPedido').value || '').toLowerCase().trim();

    let entradas = Object.entries(todosOsPedidos || {});
    
    entradas.sort(function(a, b) {
        return (b[1].criadoEm || 0) - (a[1].criadoEm || 0);
    });

    entradas = entradas.filter(function(entrada) {
        const pedido = entrada[1];
        if (!pedido) return false;
        const status = pedido.status || 'recebido';
        if (filtroAtual !== 'todos' && status !== filtroAtual) return false;
        if (busca) {
            const alvo = `${pedido.nome || ''} ${pedido.numeroPedido || ''}`.toLowerCase();
            if (!alvo.includes(busca)) return false;
        }
        return true;
    });

    if (entradas.length === 0) {
        lista.innerHTML = '<div class="vazio">Nenhum pedido encontrado 🍰</div>';
        return;
    }

    lista.innerHTML = '';
    entradas.forEach(function(entrada) {
        const id = entrada[0];
        const pedido = entrada[1];
        lista.appendChild(criarCardPedido(id, pedido));
    });

    // Limpa o destaque de "novo" depois de renderizado (evita repetir a animação
    // toda vez que a lista é redesenhada por outro motivo, tipo busca/filtro).
    if (idsRecemChegados.size > 0) {
        setTimeout(function() { idsRecemChegados = new Set(); }, 50);
    }
};

function criarCardPedido(id, pedido) {
    const status = pedido.status || 'recebido';
    const info = STATUS_INFO[status] || STATUS_INFO.recebido;
    const tipoEntrega = pedido.tipoEntrega || 'entrega';
    const ehNovo = idsRecemChegados.has(id);

    const card = document.createElement('div');
    card.className = 'pedido-card' + (ehNovo ? ' pedido-novo' : '');

    const itensHtml = (pedido.itens || []).map(function(item) {
        return `<div>${item.qtd}x ${item.nome} — R$ ${(item.preco * item.qtd).toFixed(2).replace('.', ',')}</div>`;
    }).join('');

    const enderecoLinha = tipoEntrega === 'retirada'
        ? 'Retirada no local'
        : (pedido.enderecoTexto || '') + (pedido.endereco ? ' — ' + pedido.endereco : '');

    card.innerHTML = `
        <div class="pedido-topo">
            <div>
                <div class="pedido-numero">#${pedido.numeroPedido || '-'}${ehNovo ? '<span class="tag-novo-pedido">NOVO</span>' : ''}</div>
                <div class="pedido-data">${pedido.criadoEm ? new Date(pedido.criadoEm).toLocaleString('pt-BR') : ''}</div>
            </div>
            <span class="status-badge" style="background:${info.cor}">${info.label}</span>
        </div>
        <div class="pedido-info">
            <div>👤 <b>${pedido.nome || ''}</b> — 📱 ${pedido.telefone || ''}</div>
            <div>📍 ${enderecoLinha}</div>
            <div>⏰ ${pedido.data || ''} às ${pedido.hora || ''}</div>
            <div>💳 ${pedido.pagamento || ''}</div>
        </div>
        <div class="pedido-itens">${itensHtml}</div>
        <div class="pedido-total">Total: R$ ${(pedido.total || 0).toFixed(2).replace('.', ',')}</div>
        <div class="botoes-status" data-id="${id}" data-tipo="${tipoEntrega}"></div>
        <button class="btn-whats-mini" data-acao="conversar" data-id="${id}">💬 Falar no WhatsApp</button>
    `;

    const botoesDiv = card.querySelector('.botoes-status');
    const etapas = tipoEntrega === 'retirada'
        ? [['recebido','Recebido'], ['preparo','Em Preparo'], ['pronto_retirada','Pronto p/ Retirada'], ['finalizado','Retirado']]
        : [['recebido','Recebido'], ['preparo','Em Preparo'], ['saiu_entrega','Saiu p/ Entrega'], ['finalizado','Entregue']];

    etapas.forEach(function(etapa) {
        const btn = document.createElement('button');
        btn.textContent = etapa[1];
        if (status === etapa[0]) btn.classList.add('ativo');
        btn.onclick = function() { window.atualizarStatus(id, etapa[0]); };
        botoesDiv.appendChild(btn);
    });

    card.querySelector('[data-acao="conversar"]').onclick = function() {
        window.enviarMensagemAvulsa(id);
    };

    return card;
}

atualizarUiBiometria();
</script>
